# Render.com — Web Service for FastAPI
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: portfolio-ml-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
